version: '3.8'

services:

  redis:
    image: redis:7-alpine
    container_name: banking-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  banking-api:
    build:
      context: banking_api
    container_name: banking-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

  tyk-gateway:
    image: tykio/tyk-gateway:v5.3
    container_name: tyk-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./tyk/tyk.conf:/opt/tyk-gateway/tyk.conf
      - ./tyk/apps:/opt/tyk-gateway/apps
      - ./tyk/policies:/opt/tyk-gateway/policies
    environment:
      - TYK_GW_SECRET=${TYK_GW_SECRET:-tyk-admin-secret-2024}
    depends_on:
      - redis
      - banking-api
