version: '3.8'

services:

  redis:
    image: redis:7-alpine
    container_name: banking-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  banking-api:
    build:
      context: ./banking-api
    container_name: banking-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=1433
      - DB_USER=sa
      - DB_PASSWORD=Banking@NUC2024!
      - DB_NAME=BankingDB
      - API_PORT=5000
      - JWT_SECRET=BankingDemoSecret2024!
      - JWT_EXPIRY_SECONDS=3600
    extra_hosts:
      - "host.docker.internal:host-gateway"

  tyk-gateway:
    image: tykio/tyk-gateway:v5.3
    container_name: tyk-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./tyk/tyk.conf:/opt/tyk-gateway/tyk.conf
      - ./tyk/apps:/opt/tyk-gateway/apps
      - ./tyk/policies:/opt/tyk-gateway/policies
    environment:
      - TYK_GW_SECRET=tyk-admin-secret-2024
    depends_on:
      - redis
      - banking-api
